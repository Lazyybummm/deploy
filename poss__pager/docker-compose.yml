services:
  db:
    image: mysql:8.0
    container_name: poss_pager_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_secure_password
      MYSQL_DATABASE: poss_pager
    volumes:
      - db_data:/var/lib/mysql
      - ./pos-backend/pos_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - poss_pager_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pyour_secure_password"]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 30s
    ports:
      - "3307:3306"

  backend:
    build: ./pos-backend
    container_name: poss_pager_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: your_secure_password
      DB_NAME: poss_pager

      # ✅ FIXED FOR HTTPS
      ALLOWED_ORIGINS: "https://pos.gridsphere.in"

      JWT_SECRET: your_super_secret_jwt_key_change_this

    depends_on:
      db:
        condition: service_healthy
    networks:
      - poss_pager_network
    ports:
      - "8002:8000"

  frontend:
    build: 
      context: .
      args:
        # ✅ CRITICAL FIX
        - VITE_API_URL=https://pos.gridsphere.in/api

    container_name: poss_pager_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - poss_pager_network
    ports:
      - "8080:5173"

volumes:
  db_data:

networks:
  poss_pager_network:
    driver: bridge